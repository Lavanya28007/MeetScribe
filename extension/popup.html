<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>MeetScribe</title>
    <style>
      :root {
        --bg:       #0f1115;
        --card:     #161a22;
        --text:     #eaeaea;
        --muted:    #9aa0a6;
        --accent:   #ff7a33;
        --positive: #2ecc71;
        --negative: #e74c3c;
        --neutral:  #f39c12;
        --star:     #f5c518;
      }

      * { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        width: 360px;
        font-family: "Segoe UI", system-ui, sans-serif;
        background: var(--bg);
        color: var(--text);
        padding: 14px;
      }

      /* ── Header ── */
      .header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 12px;
      }
      .header h2 { font-size: 18px; font-weight: 600; }
      .header h2 span { color: var(--accent); }
      #status-dot {
        width: 8px; height: 8px;
        border-radius: 50%;
        background: #555;
        margin-left: 6px;
        display: inline-block;
        transition: background 0.3s;
      }
      #status-dot.live { background: var(--positive); box-shadow: 0 0 4px var(--positive); }

      /* ── Tabs ── */
      .tabs {
        display: flex;
        gap: 4px;
        margin-bottom: 12px;
        background: var(--card);
        border-radius: 8px;
        padding: 4px;
      }
      .tab-btn {
        flex: 1;
        padding: 7px 0;
        background: transparent;
        color: var(--muted);
        border: none;
        border-radius: 6px;
        cursor: pointer;
        font-size: 12px;
        transition: background 0.15s, color 0.15s;
      }
      .tab-btn.active { background: var(--accent); color: #000; font-weight: 600; }
      .tab-btn:hover:not(.active) { background: #1e2229; color: var(--text); }

      /* ── Tab panels ── */
      .tab-panel { display: none; }
      .tab-panel.active { display: block; }

      /* ── Buttons ── */
      button.primary {
        width: 100%;
        padding: 9px;
        margin-bottom: 7px;
        background: var(--card);
        color: var(--text);
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-size: 13px;
        transition: background 0.15s;
      }
      button.primary:disabled { opacity: 0.5; cursor: not-allowed; }
      button.primary:hover:not(:disabled) { background: var(--accent); color: #000; }

      .btn-row { display: flex; gap: 7px; margin-bottom: 7px; }
      .btn-row button.primary { margin-bottom: 0; }

      button.secondary {
        width: 100%;
        padding: 8px;
        margin-bottom: 7px;
        background: transparent;
        border: 1px solid #2a2f3a;
        color: var(--muted);
        border-radius: 8px;
        cursor: pointer;
        font-size: 12px;
      }
      button.secondary:hover { background: #1e2229; color: var(--text); }

      button.icon-btn {
        padding: 5px 10px;
        background: transparent;
        border: 1px solid #2a2f3a;
        color: var(--muted);
        border-radius: 6px;
        cursor: pointer;
        font-size: 11px;
        transition: border-color 0.15s, color 0.15s;
      }
      button.icon-btn:hover { border-color: var(--accent); color: var(--accent); }

      /* Star button special states */
      #btn-star { transition: border-color 0.15s, color 0.15s; }
      #btn-star.starred { border-color: var(--star); color: var(--star); }
      #btn-star.starred:hover { border-color: var(--muted); color: var(--muted); }

      /* ── Inputs ── */
      label {
        display: block;
        font-size: 11px;
        color: var(--muted);
        margin: 10px 0 4px;
      }
      textarea, input[type="text"] {
        width: 100%;
        padding: 8px;
        border-radius: 6px;
        border: 1px solid #2a2f3a;
        background: var(--card);
        color: var(--text);
        font-size: 12px;
        outline: none;
      }
      textarea { resize: vertical; }
      textarea:focus, input[type="text"]:focus { border-color: var(--accent); }

      /* ── Word count ── */
      .word-count { text-align: right; font-size: 10px; color: var(--muted); margin-top: 2px; }

      /* ── Spinner ── */
      .spinner {
        display: none;
        width: 22px; height: 22px;
        margin: 7px auto;
        border: 3px solid var(--card);
        border-top: 3px solid var(--accent);
        border-radius: 50%;
        animation: spin 0.9s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }

      /* ── Output box ── */
      #output-box {
        background: var(--card);
        padding: 10px 12px;
        border-radius: 8px;
        max-height: 180px;
        overflow-y: auto;
        font-size: 12px;
        color: var(--muted);
        line-height: 1.6;
        margin-top: 8px;
      }
      #output-box h2 {
        font-size: 12px; font-weight: 600;
        color: var(--accent);
        margin: 8px 0 3px; text-align: left;
      }
      #output-box h2:first-child { margin-top: 0; }
      #output-box ul { margin: 0 0 4px; padding-left: 14px; }
      #output-box li { margin-bottom: 2px; color: var(--text); }
      #output-box p  { margin: 0 0 4px; color: var(--text); }

      /* ── Output toolbar ── */
      .output-toolbar { display: flex; justify-content: flex-end; gap: 6px; margin-top: 5px; }

      /* ── Sentiment badge ── */
      .sentiment-row { display: flex; align-items: center; gap: 8px; margin-top: 8px; font-size: 12px; }
      .sentiment-badge {
        padding: 3px 10px; border-radius: 20px;
        font-size: 11px; font-weight: 600;
        text-transform: uppercase; letter-spacing: 0.04em;
      }
      .badge-positive { background: rgba(46,204,113,0.15); color: var(--positive); }
      .badge-negative { background: rgba(231,76,60,0.15);  color: var(--negative); }
      .badge-neutral  { background: rgba(243,156,18,0.15); color: var(--neutral); }

      /* ── Tags ── */
      .tags-row { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 6px; }
      .tag-pill {
        background: #1e2229; border: 1px solid #2a2f3a;
        color: var(--muted); border-radius: 20px;
        font-size: 11px; padding: 2px 9px;
      }

      /* ── Q&A ── */
      #qa-history {
        background: var(--card); border-radius: 8px;
        padding: 8px 10px; max-height: 160px;
        overflow-y: auto; font-size: 12px; margin-bottom: 8px;
      }
      .qa-q { color: var(--accent); margin-bottom: 2px; }
      .qa-a { color: var(--text); margin-bottom: 10px; line-height: 1.5; }

      /* ── Participants ── */
      .participants { font-size: 11px; color: var(--muted); margin-top: 5px; }
      .participants span { color: var(--text); font-weight: 500; }
    </style>
  </head>
  <body>

    <!-- Header -->
    <div class="header">
      <h2>Meet<span>Scribe</span> <span id="status-dot" title="Captions status"></span></h2>
      <button class="icon-btn" id="btn-star" title="Star this meeting">☆ Star</button>
    </div>

    <!-- Tabs -->
    <div class="tabs">
      <button class="tab-btn active" data-tab="tab-summary">📋 Summary</button>
      <button class="tab-btn"        data-tab="tab-ask">💬 Ask AI</button>
      <button class="tab-btn"        data-tab="tab-history">🕑 History</button>
    </div>

    <!-- TAB: SUMMARY -->
    <div class="tab-panel active" id="tab-summary">
      <div class="btn-row">
        <button class="primary" id="summarize">Summarize</button>
        <button class="primary" id="actions">Action Items</button>
      </div>
      <div class="btn-row">
        <button class="primary" id="btn-sentiment">😐 Sentiment</button>
        <button class="primary" id="btn-autotag">🏷 Auto-Tag</button>
      </div>

      <label for="transcript">Transcript (paste or leave empty to fetch from tab)</label>
      <textarea id="transcript" rows="3" placeholder="Paste transcript here, or leave blank to capture from Meet..."></textarea>
      <div class="word-count" id="word-count">0 words</div>

      <div class="spinner" id="spinner"></div>
      <div id="output-box">Ready when you are.</div>

      <div id="sentiment-row" class="sentiment-row" style="display:none">
        <div id="sentiment-badge" class="sentiment-badge"></div>
        <div id="sentiment-insight" style="color:var(--muted)"></div>
      </div>

      <div id="participants-row" class="participants" style="display:none">
        👥 <span id="participants-list"></span>
      </div>

      <div class="tags-row" id="tags-row"></div>

      <div class="output-toolbar">
        <button class="icon-btn" id="btn-copy"   style="display:none">📋 Copy</button>
        <button class="icon-btn" id="btn-export" style="display:none">📥 Export .txt</button>
      </div>
    </div>

    <!-- TAB: ASK AI -->
    <div class="tab-panel" id="tab-ask">
      <p style="font-size:12px; color:var(--muted); margin-bottom:8px;">
        Ask any question about the current meeting transcript.
      </p>
      <div id="qa-history"></div>
      <input type="text" id="qa-input" placeholder="e.g. Who owns the backend task?" />
      <button class="primary" id="btn-ask" style="margin-top:7px">Ask</button>
    </div>

    <!-- TAB: HISTORY -->
    <div class="tab-panel" id="tab-history">
      <button class="secondary" id="btn-history">📂 Open Full History</button>
      <button class="secondary" id="btn-starred">⭐ Starred Meetings</button>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
