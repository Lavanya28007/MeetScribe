<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>MeetScribe</title>
    <style>
      :root {
        --bg: #0f1115;
        --card: #161a22;
        --text: #eaeaea;
        --muted: #9aa0a6;
        --accent: #ff7a33;
        --error: #e74c3c;
      }

      * { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        width: 340px;
        font-family: "Segoe UI", system-ui, sans-serif;
        background: var(--bg);
        color: var(--text);
        padding: 16px;
      }

      h2 {
        text-align: center;
        font-size: 20px;
        font-weight: 600;
        margin-bottom: 14px;
      }
      h2 span { color: var(--accent); }

      button {
        width: 100%;
        padding: 10px;
        margin-bottom: 8px;
        background: var(--card);
        color: var(--text);
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-size: 13px;
      }
      button:disabled { opacity: 0.5; cursor: not-allowed; }
      button:hover:not(:disabled) { background: var(--accent); color: #000; }

      .btn-row { display: flex; gap: 8px; margin-bottom: 8px; }
      .btn-row button { margin-bottom: 0; }
      button.secondary {
        background: transparent;
        border: 1px solid #2a2f3a;
        color: var(--muted);
      }
      button.secondary:hover { background: #1e2229; color: var(--text); }

      label {
        display: block;
        font-size: 11px;
        color: var(--muted);
        margin: 10px 0 4px;
      }

      textarea {
        width: 100%; padding: 8px;
        border-radius: 6px; border: 1px solid #2a2f3a;
        background: var(--card); color: var(--text);
        resize: vertical; font-size: 12px; outline: none;
      }
      textarea:focus { border-color: var(--accent); }

      .spinner {
        display: none;
        width: 24px; height: 24px;
        margin: 8px auto;
        border: 3px solid var(--card);
        border-top: 3px solid var(--accent);
        border-radius: 50%;
        animation: spin 0.9s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }

      #output-box {
        background: var(--card);
        padding: 10px 12px;
        border-radius: 8px;
        max-height: 200px;
        overflow-y: auto;
        font-size: 12px;
        color: var(--muted);
        line-height: 1.6;
        margin-top: 8px;
      }
      #output-box h2 {
        font-size: 12px; font-weight: 600;
        color: var(--accent); margin: 8px 0 3px;
        text-align: left;
      }
      #output-box h2:first-child { margin-top: 0; }
      #output-box ul { margin: 0 0 4px; padding-left: 14px; }
      #output-box li { margin-bottom: 2px; color: var(--text); }
      #output-box p { margin: 0 0 4px; color: var(--text); }
    </style>
  </head>
  <body>

    <h2>Meet<span>Scribe</span></h2>

    <div class="btn-row">
      <button id="summarize">Summarize Meeting</button>
      <button id="actions">Action Items</button>
    </div>

    <button class="secondary" id="btn-history" style="font-size:12px">📋 View History</button>

    <label for="transcript">Transcript (paste or leave empty to fetch from tab)</label>
    <textarea id="transcript" rows="3"></textarea>

    <div class="spinner" id="spinner"></div>
    <div id="output-box">Ready when you are.</div>

    <script src="popup.js"></script>
  </body>
</html>
