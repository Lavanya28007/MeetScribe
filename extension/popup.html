<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>MeetScribe</title>

    <style>
      :root {
        --bg: #0f1115;
        --card: #161a22;
        --text: #eaeaea;
        --muted: #9aa0a6;
        --accent: #ff7a33;
        --success: #2ecc71;
        --error: #e74c3c;
      }

      body {
        width: 320px;
        margin: 0;
        padding: 16px;
        font-family: "Segoe UI", system-ui, sans-serif;
        background: var(--bg);
        color: var(--text);
      }

      h2 {
        text-align: center;
        color: var(--accent);
        margin-bottom: 14px;
      }

      button {
        width: 100%;
        padding: 11px;
        margin-bottom: 10px;
        background: var(--card);
        color: var(--text);
        border: none;
        border-radius: 8px;
        cursor: pointer;
      }

      button:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }

      button:hover:not(:disabled) {
        background: var(--accent);
        color: #000;
      }

      .spinner {
        display: none;
        width: 28px;
        height: 28px;
        margin: 10px auto;
        border: 3px solid var(--card);
        border-top: 3px solid var(--accent);
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      pre {
        background: var(--card);
        padding: 10px;
        border-radius: 8px;
        max-height: 150px;
        overflow-y: auto;
        font-size: 12px;
        color: var(--muted);
      }

      /* Toasts */
      .toast {
        position: fixed;
        bottom: 16px;
        left: 50%;
        transform: translateX(-50%);
        padding: 10px 14px;
        border-radius: 6px;
        font-size: 13px;
        color: #000;
        animation: fadeInOut 3s forwards;
      }

      .toast.success {
        background: var(--success);
      }

      .toast.error {
        background: var(--error);
        color: #fff;
      }

      @keyframes fadeInOut {
        0% { opacity: 0; transform: translate(-50%, 10px); }
        10% { opacity: 1; transform: translate(-50%, 0); }
        90% { opacity: 1; }
        100% { opacity: 0; }
      }
    </style>
  </head>

  <body>
    <h2>MeetScribe</h2>

    <button id="summarize">Summarize Meeting</button>
    <button id="actions">Get Action Items</button>

    <label for="transcript" style="display:block;margin:8px 0 4px;color:var(--muted);font-size:12px;">Transcript (paste or leave empty to fetch from tab)</label>
    <textarea id="transcript" rows="6" style="width:100%;padding:8px;border-radius:6px;border:none;background:var(--card);color:var(--text);resize:vertical;font-size:12px;"> </textarea>

    <div class="spinner" id="spinner"></div>
    <pre id="output">Ready when you are.</pre>

    <script src="popup.js"></script>
  </body>
</html>
